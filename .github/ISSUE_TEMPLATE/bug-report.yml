name: Bug report
description: Report a reproducible runtime, provider, evaluation, or Studio problem.
title: "[bug]: "
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the observed and expected behavior without including secrets.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide the smallest safe command, config shape, or mock-provider case.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit or version
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
    validations:
      required: true
  - type: checkboxes
    id: secrets
    attributes:
      label: Safety
      options:
        - label: I removed API keys, private prompts, personal data, and provider response secrets.
          required: true
