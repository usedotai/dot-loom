<text x="54" y="76" class="subtitle" text-anchor="start">Cells show blinded judge score. A dot marks answers that also passed every deterministic check.</text>
<text x="54" y="100" class="subtitle" text-anchor="start">Use case-level variation to avoid choosing a model from one average alone.</text>
