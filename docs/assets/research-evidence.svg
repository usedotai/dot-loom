    <text x="22" y="135" fill="#b7f36b" font-size="14" font-family="ui-monospace,monospace">POINTS ABSOLUTE</text>
    <text x="22" y="182" fill="#b9b8b1" font-size="14" font-family="Inter,system-ui,sans-serif">Average task improvement</text>
