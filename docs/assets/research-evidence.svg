    <text x="22" y="34" fill="#96958e" font-size="12" letter-spacing="1.3" font-family="ui-monospace,monospace">MIXTURE-OF-AGENTS</text>
    <text x="22" y="105" fill="#ece9df" font-size="56" font-weight="720" font-family="Inter,system-ui,sans-serif">65.1</text>
    <text x="22" y="135" fill="#b7f36b" font-size="14" font-family="ui-monospace,monospace">ALPACAEVAL 2.0</text>
    <text x="22" y="182" fill="#b9b8b1" font-size="14" font-family="Inter,system-ui,sans-serif">Open-source MoA vs 57.5</text>
